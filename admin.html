<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESIDENT MANAGER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --accent: #fbbf24; }
        body { background: var(--bg); color: #94a3b8; font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Arabic', sans-serif; margin: 0; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.25rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        input, select { background: #000 !important; border: 1px solid #334155 !important; color: white !important; outline: none !important; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--accent) !important; }
        
        .resident-row { border-bottom: 1px solid rgba(255,255,255,0.02); transition: background 0.2s; }
        .resident-row:hover { background: rgba(255,255,255,0.03); }
        
        .spec-header { background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(11,14,17,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .is-loading .loading-overlay { display: flex; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loader" class="loading-overlay"><div class="text-white font-black animate-pulse">SYNCING WITH GITHUB...</div></div>

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Resident DB 🇮🇶</h1>
                <p class="text-xs font-bold text-amber-500/60 tracking-widest uppercase">Management Suite</p>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="bg-white/5 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all">← Back to Scheduler</a>
                <button onclick="saveToGithub()" id="save-btn" class="bg-amber-500 hover:bg-amber-400 text-black px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-amber-500/20 active:scale-95 transition-all">Save All Changes</button>
            </div>
        </div>

        <div class="card p-6 mb-8">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-1.5 h-4 bg-amber-500 rounded-full"></div>
                <h2 class="text-xs font-black text-white uppercase tracking-widest">Register New Resident</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <input type="text" id="new-name" placeholder="Name (e.g. د. محمد...)" class="md:col-span-6 p-3.5 rounded-xl text-sm font-bold">
                <select id="new-spec" class="md:col-span-4 p-3.5 rounded-xl text-sm font-bold">
                    <option value="NS">Neurosurgery (NS)</option>
                    <option value="CT">Cardiothoracic (CT)</option>
                    <option value="GS">General Surg (GS)</option>
                    <option value="US">Urosurgery (US)</option>
                    <option value="ENT">ENT Dept (ENT)</option>
                    <option value="H">Cardiology (H)</option>
                    <option value="A">Anesthesia (OP/ICU)</option>
                    <option value="R">Radiology (R)</option>
                    <option value="ON">Oncology (ON)</option>
                </select>
                <button onclick="addResident()" class="md:col-span-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-black text-[10px] uppercase transition-all">Add</button>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="p-5 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/5">
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-db" oninput="renderResidents()" placeholder="Search names..." class="w-full p-2.5 pl-4 rounded-lg text-xs font-bold border-none !bg-white/5">
                </div>
                <span id="count-tag" class="text-[10px] font-black text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full uppercase tracking-widest">0 Total Residents</span>
            </div>
            
            <div id="resident-list" class="max-h-[60vh] overflow-y-auto">
                </div>
        </div>
    </div>

<script>
    const CONFIG = {
        user: "mHub96", repo: "db", path: "data.json",
        rawUrl: "https://raw.githubusercontent.com/mHub96/db/main/data.json"
    };

    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "A", name: "Anesthesia (All)" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let GH_TOKEN = localStorage.getItem('gh_token');
    let db = { names: [], schedule: [] };
    let fileSha = "";

    window.onload = init;

    function toggleLoader(show) {
        document.body.classList.toggle('is-loading', show);
    }

    async function init() {
        if (!GH_TOKEN) return alert("No GitHub Token found. Please login on the main page first! 🇮🇶");
        toggleLoader(true);
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}`, "Accept": "application/vnd.github.v3+json" }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                renderResidents();
            }
        } catch (e) { console.error(e); alert("Failed to connect to GitHub."); }
        finally { toggleLoader(false); }
    }

    function renderResidents() {
        const list = document.getElementById('resident-list');
        const countTag = document.getElementById('count-tag');
        const searchTerm = document.getElementById('search-db').value.toLowerCase();
        list.innerHTML = "";
        
        let totalVisible = 0;
        const grouped = {};
        specialties.forEach(s => grouped[s.id] = []);
        
        // Filter and Group
        db.names.forEach((res, originalIndex) => {
            if (res[0].toLowerCase().includes(searchTerm)) {
                grouped[res[1]]?.push({ name: res[0], id: res[1], idx: originalIndex });
                totalVisible++;
            }
        });

        countTag.innerText = `${totalVisible} REGISTERED`;

        // Render Groups
        specialties.forEach(spec => {
            const residents = grouped[spec.id];
            if (residents.length === 0) return;

            residents.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            const header = document.createElement('div');
            header.className = "spec-header px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-amber-500 flex justify-between";
            header.innerHTML = `<span>${spec.name}</span><span>${residents.length}</span>`;
            list.appendChild(header);

            residents.forEach(res => {
                const row = document.createElement('div');
                row.className = "resident-row px-5 py-4 flex justify-between items-center";
                row.innerHTML = `
                    <span class="text-white font-bold text-sm">${res.name}</span>
                    <div class="flex gap-2">
                        <button onclick="editResident(${res.idx})" class="text-[9px] font-black text-blue-400 hover:text-white uppercase tracking-tighter px-3 py-1.5 border border-blue-400/20 rounded-lg transition-all">Edit</button>
                        <button onclick="deleteResident(${res.idx})" class="text-[9px] font-black text-red-400 hover:text-white uppercase tracking-tighter px-3 py-1.5 border border-red-400/20 rounded-lg transition-all">Delete</button>
                    </div>
                `;
                list.appendChild(row);
            });
        });
    }

    function addResident() {
        const nameInput = document.getElementById('new-name');
        const specInput = document.getElementById('new-spec');
        const name = nameInput.value.trim();
        if (!name) return;
        
        db.names.push([name, specInput.value]);
        nameInput.value = "";
        renderResidents();
    }

    function deleteResident(index) {
        if (confirm(`Remove ${db.names[index][0]} from database?`)) {
            db.names.splice(index, 1);
            renderResidents();
        }
    }

    function editResident(index) {
        const currentName = db.names[index][0];
        const newName = prompt(`Edit name for resident:`, currentName);
        if (newName && newName.trim() !== "") {
            db.names[index][0] = newName.trim();
            renderResidents();
        }
    }

    async function saveToGithub() {
        const btn = document.getElementById('save-btn');
        const originalText = btn.innerText;
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        toggleLoader(true);

        try {
            // Sorting schedule before save for organization
            db.schedule.sort((a, b) => {
                const [da, ma, ya] = a.date.split('/').map(Number);
                const [db, mb, yb] = b.date.split('/').map(Number);
                return new Date(ya, ma - 1, da) - new Date(yb, mb - 1, db);
            });

            const body = { 
                message: "Update Resident Database 🇮🇶", 
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), 
                sha: fileSha 
            };
            
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}`, "Accept": "application/vnd.github.v3+json" },
                body: JSON.stringify(body)
            });
            
            if (res.ok) {
                const updated = await res.json();
                fileSha = updated.content.sha;
                alert("Database updated and organized! ✅");
            } else {
                alert("GitHub Error: Could not save changes.");
            }
        } catch (e) { alert("Network Error: Save failed."); }
        finally {
            btn.innerText = originalText;
            btn.disabled = false;
            toggleLoader(false);
        }
    }
</script>
</body>
</html>
