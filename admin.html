<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة المقيمين 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --accent: #fbbf24; }
        
        /* FULL RTL SYSTEM */
        body { 
            background: var(--bg); 
            color: #94a3b8; 
            font-family: 'IBM Plex Sans Arabic', 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            direction: rtl; 
            text-align: right;
        }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.25rem; }
        
        input, select { 
            background: #000 !important; 
            border: 1px solid #334155 !important; 
            color: white !important; 
            outline: none !important; 
            text-align: right;
        }
        input:focus, select:focus { border-color: var(--accent) !important; }
        
        /* Row Layout: Name Right, Buttons Left */
        .resident-row { 
            border-bottom: 1px solid rgba(255,255,255,0.02); 
            display: flex;
            justify-content: space-between; /* Pushes content to opposite ends */
            align-items: center;
        }

        .spec-header { 
            background: rgba(255,255,255,0.03); 
            border-top: 1px solid rgba(255,255,255,0.05); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding: 0.5rem 1.25rem;
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
        }

        .loading-overlay { position: fixed; inset: 0; background: rgba(11,14,17,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .is-loading .loading-overlay { display: flex; }
        
        /* Ensuring buttons stay on the left in LTR fashion internally */
        .btn-group { display: flex; gap: 0.5rem; direction: ltr; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loader" class="loading-overlay"><div class="text-white font-black animate-pulse text-xs uppercase tracking-widest">جاري التحديث...</div></div>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">قاعدة بيانات المقيمين 🇮🇶</h1>
                <p class="text-[10px] font-bold text-amber-500 uppercase tracking-[0.2em]">إدارة أرقام الهواتف والأقسام</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-white/5 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">الجدول الرئيسي</a>
                <button onclick="saveToGithub()" id="save-btn" class="bg-amber-500 text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">حفظ التغييرات</button>
            </div>
        </div>

        <div class="card p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                <input type="text" id="new-name" placeholder="الاسم (د. محمد...)" class="md:col-span-5 p-3 rounded-xl text-sm font-bold">
                <input type="tel" id="new-phone" placeholder="0770..." class="md:col-span-3 p-3 rounded-xl text-sm font-bold">
                <select id="new-spec" class="md:col-span-3 p-3 rounded-xl text-sm font-bold">
                    <option value="NS">Neurosurgery (NS)</option>
                    <option value="CT">Cardiothoracic (CT)</option>
                    <option value="GS">General Surg (GS)</option>
                    <option value="US">Urosurgery (US)</option>
                    <option value="ENT">ENT Dept (ENT)</option>
                    <option value="H">Cardiology (H)</option>
                    <option value="A">Anesthesia (All)</option>
                    <option value="R">Radiology (R)</option>
                    <option value="ON">Oncology (ON)</option>
                </select>
                <button onclick="addResident()" class="md:col-span-1 bg-blue-600 text-white rounded-xl font-black text-xs uppercase">إضافة</button>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                <input type="text" id="search-db" oninput="renderResidents()" placeholder="بحث عن اسم..." class="w-full md:w-64 p-2 px-4 rounded-lg text-xs font-bold !bg-black">
                <span id="count-tag" class="text-[10px] font-black text-amber-500 uppercase">العدد الكلي: 0</span>
            </div>
            <div id="resident-list" class="max-h-[60vh] overflow-y-auto"></div>
        </div>
    </div>

<script>
    const CONFIG = { user: "mHub96", repo: "db", path: "data.json" };
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "A", name: "Anesthesia (All)" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let GH_TOKEN = localStorage.getItem('gh_token');
    let db = { names: [], schedule: [] };
    let fileSha = "";

    window.onload = init;

    function formatIraqiPhone(num) {
        let clean = num.replace(/\D/g, ''); 
        if (clean.startsWith('07')) return '+964' + clean.substring(1);
        if (clean.startsWith('7')) return '+964' + clean;
        return num;
    }

    async function init() {
        if (!GH_TOKEN) return alert("يرجى تسجيل الدخول أولاً!");
        document.body.classList.add('is-loading');
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}`, "Accept": "application/vnd.github.v3+json" }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                db.names = db.names.map(e => Array.isArray(e) ? { name: e[0], spec: e[1], phone: "" } : e);
                renderResidents();
            }
        } catch (e) { console.error(e); }
        document.body.classList.remove('is-loading');
    }

    function renderResidents() {
        const list = document.getElementById('resident-list');
        const searchTerm = document.getElementById('search-db').value.toLowerCase();
        list.innerHTML = "";
        
        const grouped = {};
        specialties.forEach(s => grouped[s.id] = []);
        db.names.forEach((res, i) => {
            if (res.name.toLowerCase().includes(searchTerm)) grouped[res.spec]?.push({ ...res, idx: i });
        });

        specialties.forEach(spec => {
            const residents = grouped[spec.id];
            if (residents.length === 0) return;
            residents.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            const header = document.createElement('div');
            header.className = "spec-header";
            header.innerHTML = `<span>${spec.name}</span><span>${residents.length}</span>`;
            list.appendChild(header);

            residents.forEach(res => {
                const row = document.createElement('div');
                row.className = "resident-row px-5 py-4";
                row.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-white font-bold text-sm">${res.name}</span>
                        <span class="text-[10px] text-slate-500 font-mono tracking-tighter">${res.phone || 'بدون رقم'}</span>
                    </div>
                    <div class="btn-group">
                        <button onclick="editResident(${res.idx})" class="text-[9px] font-bold text-blue-400 uppercase px-3 py-1.5 border border-blue-400/20 rounded-lg transition-all hover:bg-blue-400/10">Edit</button>
                        <button onclick="deleteResident(${res.idx})" class="text-[9px] font-bold text-red-500 uppercase px-3 py-1.5 border border-red-500/20 rounded-lg transition-all hover:bg-red-500/10">Delete</button>
                    </div>
                `;
                list.appendChild(row);
            });
        });
        document.getElementById('count-tag').innerText = `العدد الكلي: ${db.names.length}`;
    }

    function addResident() {
        const name = document.getElementById('new-name').value.trim();
        const rawPhone = document.getElementById('new-phone').value.trim();
        const spec = document.getElementById('new-spec').value;
        if (!name) return;
        db.names.push({ name, spec, phone: formatIraqiPhone(rawPhone) });
        document.getElementById('new-name').value = "";
        document.getElementById('new-phone').value = "";
        renderResidents();
    }

    function editResident(index) {
        const res = db.names[index];
        const newName = prompt("تعديل الاسم:", res.name);
        const newPhoneRaw = prompt("تعديل الرقم:", res.phone || "");
        if (newName !== null) {
            db.names[index].name = newName.trim();
            if (newPhoneRaw !== null) db.names[index].phone = formatIraqiPhone(newPhoneRaw.trim());
            renderResidents();
        }
    }

    function deleteResident(idx) {
        if (confirm(`هل أنت متأكد من حذف ${db.names[idx].name}؟`)) {
            db.names.splice(idx, 1);
            renderResidents();
        }
    }

    async function saveToGithub() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "جاري الحفظ...";
        document.body.classList.add('is-loading');
        try {
            const body = { 
                message: "RTL Update & Phone Formatting 🇮🇶", 
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), 
                sha: fileSha 
            };
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}`, "Accept": "application/vnd.github.v3+json" },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const updated = await res.json();
                fileSha = updated.content.sha;
                alert("تم الحفظ بنجاح! ✅");
            }
        } catch (e) { alert("خطأ في الحفظ."); }
        btn.innerText = "حفظ التغييرات";
        document.body.classList.remove('is-loading');
    }
</script>
</body>
</html>
