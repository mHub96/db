<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOSPITAL SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --column-width: 300px; --nav-h: 70px; }
        .track-NS { --spec-color: #fbbf24; } .track-CT { --spec-color: #f87171; } 
        .track-GS { --spec-color: #34d399; } .track-US { --spec-color: #60a5fa; } 
        .track-ENT { --spec-color: #a78bfa; } .track-H { --spec-color: #fb7185; } 
        .track-D { --spec-color: #94a3b8; } .track-OP { --spec-color: #fb923c; } 
        .track-ICU { --spec-color: #2dd4bf; } .track-R { --spec-color: #818cf8; } 
        .track-ON { --spec-color: #f472b6; } 

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .board-container { flex-grow: 1; display: flex; gap: 1rem; padding: 1rem; overflow-x: auto; align-items: flex-start; }
        .specialty-track { flex: 0 0 var(--column-width); background: var(--card); border-radius: 1.5rem; display: flex; flex-direction: column; max-height: 95%; border: 1px solid rgba(255,255,255,0.05); }
        .track-header { padding: 1rem; text-align: center; border-bottom: 3px solid var(--spec-color); }
        .track-header h2 { color: var(--spec-color); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        .days-list { flex: 1; overflow-y: auto; padding: 0.5rem; scrollbar-width: none; }
        .day-box { background: rgba(255,255,255,0.02); margin-bottom: 0.4rem; border-radius: 0.8rem; padding: 0.5rem; border: 1px solid transparent; }
        .day-box.weekend { background: rgba(255,255,255,0.06); border-left: 3px solid var(--spec-color); }
        .day-label { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 700; color: #64748b; margin-bottom: 2px; }
        .input-wrapper { position: relative; width: 100%; direction: rtl; }
        .cell-input { width: 100%; font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 0.95rem; padding: 0.5rem; text-align: right; background: transparent; border: none; outline: none; color: #fff; }
        .ghost-text { position: absolute; top: 0; right: 0; color: rgba(255,255,255,0.15); pointer-events: none; height: 100%; width: 100%; display: flex; align-items: center; padding-right: 0.5rem; text-align: right; direction: rtl; }
        .prefilled { color: var(--spec-color) !important; font-weight: 600; }
        .nav-bar { height: var(--nav-h); padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #111418; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .loading-active { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div class="nav-bar">
            <h1 class="text-white font-black text-sm tracking-tight">SCHEDULER 🇮🇶</h1>
            <div class="flex gap-2">
                <input type="month" id="month-picker" class="bg-black text-amber-500 px-2 py-1 rounded border border-white/10 text-xs" onchange="refreshView()">
                <button onclick="saveToGithub()" id="sync-btn" class="bg-white text-black px-3 py-1 rounded font-bold text-[10px] uppercase">Sync</button>
                <button onclick="migrateFromGoogle()" class="bg-green-600 text-white px-3 py-1 rounded font-bold text-[10px] uppercase">Migrate</button>
                <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded font-bold text-[10px] uppercase">Login</button>
            </div>
        </div>
        <div class="board-container" id="board"></div>
    </div>

<script>
    const CONFIG = {
        user: "mHub96",
        repo: "db",
        path: "data.json",
        googleUrl: "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec"
    };

    let GH_TOKEN = localStorage.getItem('gh_token');
    let db = { names: [], schedule: [] };
    let fileSha = "";
    let nameLookup = {};

    const specs = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    window.onload = () => {
        const d = new Date();
        document.getElementById('month-picker').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        init();
    };

    function login() {
        const t = prompt("Paste GitHub Token:");
        if (t) { localStorage.setItem('gh_token', t); location.reload(); }
    }

    async function init() {
        if (!GH_TOKEN) return alert("Please click 'Login' to connect GitHub.");
        
        document.getElementById('app-wrapper').classList.add('loading-active');
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
            });

            if (!res.ok) throw new Error("GitHub error: " + res.status);

            const data = await res.json();
            fileSha = data.sha;
            db = JSON.parse(decodeURIComponent(escape(atob(data.content))));

            // Build Autocomplete Maps
            specs.forEach(s => {
                if (s.id === "OP" || s.id === "ICU") nameLookup[s.id] = db.names.filter(x => x[1] === "A").map(x => x[0]);
                else if (s.id === "D") nameLookup[s.id] = db.names.map(x => x[0]);
                else nameLookup[s.id] = db.names.filter(x => x[1] === s.id).map(x => x[0]);
            });

            refreshView();
        } catch (e) {
            console.error(e);
            alert("Connection Failed. Check Token.");
        } finally {
            document.getElementById('app-wrapper').classList.remove('loading-active');
        }
    }

    function refreshView() {
        generateBoard();
        renderData();
    }

    function generateBoard() {
        const [yr, mon] = document.getElementById('month-picker').value.split('-').map(Number);
        const days = new Date(yr, mon, 0).getDate();
        const container = document.getElementById('board');
        container.innerHTML = "";

        specs.forEach(s => {
            const track = document.createElement('div');
            track.className = `specialty-track track-${s.id}`;
            let html = `<div class="track-header"><h2>${s.name}</h2></div><div class="days-list">`;
            
            for (let d = 1; d <= days; d++) {
                const dateObj = new Date(yr, mon - 1, d);
                const isWE = dateObj.getDay() === 5 || dateObj.getDay() === 6;
                const dateStr = `${String(d).padStart(2, '0')}/${String(mon).padStart(2, '0')}/${yr}`;
                const id = `${d}-${s.id}`;
                
                html += `
                <div class="day-box ${isWE ? 'weekend' : ''}">
                    <div class="day-label"><span>${dateStr.substring(0,5)}</span><span>${new Intl.DateTimeFormat('ar-IQ', {weekday:'short'}).format(dateObj)}</span></div>
                    <div class="input-wrapper">
                        <div class="ghost-text" id="ghost-${id}"></div>
                        <input type="text" class="cell-input" id="input-${id}" 
                            oninput="doAC(this, '${s.id}', '${id}')" 
                            onkeydown="doKey(event, this, '${id}')"
                            data-date="${dateStr}" data-spec="${s.id}" autocomplete="off">
                    </div>
                </div>`;
            }
            track.innerHTML = html + `</div>`;
            container.appendChild(track);
        });
    }

    function renderData() {
        const [yr, mon] = document.getElementById('month-picker').value.split('-');
        db.schedule.forEach(row => {
            if (row.date.endsWith(`${mon}/${yr}`)) {
                const day = parseInt(row.date.split('/')[0]);
                const input = document.getElementById(`input-${day}-${row.specCode}`);
                if (input) { input.value = row.name; input.classList.add('prefilled'); }
            }
        });
    }

    function doAC(el, sid, id) {
        const ghost = document.getElementById(`ghost-${id}`);
        const val = el.value.trim();
        ghost.innerText = ""; delete el.dataset.match;
        if (!val || !nameLookup[sid]) return;
        const found = nameLookup[sid].find(n => n.toLowerCase().includes(val.toLowerCase()));
        if (found) { ghost.innerText = found; el.dataset.match = found; }
    }

    function doKey(e, el, id) {
        if (e.key === "Enter" && el.dataset.match) {
            el.value = el.dataset.match;
            el.classList.add('prefilled');
            document.getElementById(`ghost-${id}`).innerText = "";
        }
    }

    async function saveToGithub() {
        const btn = document.getElementById('sync-btn');
        btn.innerText = "WAIT";
        
        const inputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
        const currentData = inputs.map(i => ({ date: i.dataset.date, specCode: i.dataset.spec, name: i.value.trim() }));
        
        const [yr, mon] = document.getElementById('month-picker').value.split('-');
        const otherMonths = db.schedule.filter(r => !r.date.endsWith(`${mon}/${yr}`));
        db.schedule = [...otherMonths, ...currentData];

        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update 🇮🇶", content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), sha: fileSha })
            });
            if (res.ok) {
                const r = await res.json();
                fileSha = r.content.sha;
                btn.innerText = "DONE ✅";
            }
        } catch(e) { btn.innerText = "ERR"; }
        setTimeout(() => btn.innerText = "Sync", 2000);
    }

    async function migrateFromGoogle() {
        if (!confirm("Pull all data from Google Sheets?")) return;
        try {
            const [nRes, sRes] = await Promise.all([
                fetch(`${CONFIG.googleUrl}?action=getNames`),
                fetch(`${CONFIG.googleUrl}?action=getSchedule&month=${document.getElementById('month-picker').value}`)
            ]);
            db.names = await nRes.json();
            db.schedule = await sRes.json();
            await saveToGithub();
            alert("Migration Complete! 🇮🇶");
            location.reload();
        } catch(e) { alert("Migration Error."); }
    }
</script>
</body>
</html>
