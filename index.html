<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOSPITAL SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --column-width: 300px; --nav-h: 70px; }
        .track-NS { --spec-color: #fbbf24; } .track-CT { --spec-color: #f87171; } 
        .track-GS { --spec-color: #34d399; } .track-US { --spec-color: #60a5fa; } 
        .track-ENT { --spec-color: #a78bfa; } .track-H { --spec-color: #fb7185; } 
        .track-D { --spec-color: #94a3b8; } .track-OP { --spec-color: #fb923c; } 
        .track-ICU { --spec-color: #2dd4bf; } .track-R { --spec-color: #818cf8; } 
        .track-ON { --spec-color: #f472b6; } 

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .board-container { flex-grow: 1; display: flex; gap: 1rem; padding: 1rem; overflow-x: auto; align-items: flex-start; }
        .specialty-track { flex: 0 0 var(--column-width); background: var(--card); border-radius: 1.5rem; display: flex; flex-direction: column; max-height: 95%; border: 1px solid rgba(255,255,255,0.05); }
        .track-header { padding: 1rem; text-align: center; border-bottom: 3px solid var(--spec-color); }
        .track-header h2 { color: var(--spec-color); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        .days-list { flex: 1; overflow-y: auto; padding: 0.5rem; scrollbar-width: none; }
        .day-box { background: rgba(255,255,255,0.02); margin-bottom: 0.4rem; border-radius: 0.8rem; padding: 0.5rem; border: 1px solid transparent; }
        .day-box.weekend { background: rgba(255,255,255,0.06); border-left: 3px solid var(--spec-color); }
        .day-label { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 700; color: #64748b; margin-bottom: 2px; }
        .input-wrapper { position: relative; width: 100%; direction: rtl; }
        .cell-input { width: 100%; font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 0.95rem; padding: 0.5rem; text-align: right; background: transparent; border: none; outline: none; color: #fff; }
        .ghost-text { position: absolute; top: 0; right: 0; color: rgba(255,255,255,0.15); pointer-events: none; height: 100%; width: 100%; display: flex; align-items: center; padding-right: 0.5rem; text-align: right; direction: rtl; }
        .prefilled { color: var(--spec-color) !important; font-weight: 600; }
        .nav-bar { height: var(--nav-h); padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #111418; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .loading-active { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div class="nav-bar">
            <h1 class="text-white font-black text-sm tracking-tight">SCHEDULER 🇮🇶</h1>
            <div class="flex gap-2">
                <input type="month" id="month-picker" class="bg-black text-amber-500 px-2 py-1 rounded border border-white/10 text-xs" onchange="refreshView()">
                <button onclick="saveToGithub()" id="sync-btn" class="bg-white text-black px-3 py-1 rounded font-bold text-[10px] uppercase">Sync</button>
                <button onclick="migrateFromGoogle()" class="bg-green-600 text-white px-3 py-1 rounded font-bold text-[10px] uppercase">Migrate</button>
                <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded font-bold text-[10px] uppercase">Login</button>
            </div>
        </div>
        <div class="board-container" id="board"></div>
    </div>

<script>
    const CONFIG = {
        user: "mHub96",
        repo: "db",
        path: "data.json", // Ensure this is EXACTLY the name in your GitHub
        googleUrl: "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec"
    };

    let GH_TOKEN = localStorage.getItem('gh_token');
    let db = { names: [], schedule: [] };
    let fileSha = "";
    let nameLookup = {};

    const specs = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    window.onload = () => {
        const d = new Date();
        document.getElementById('month-picker').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        init();
    };

    function login() {
        const t = prompt("Paste your NEW Token here 🇮🇶:");
        if (t) { 
            localStorage.setItem('gh_token', t.trim()); 
            location.reload(); 
        }
    }

    async function init() {
        if (!GH_TOKEN) {
            alert("No Token Found. Please click the blue LOGIN button.");
            return;
        }
        
        const wrapper = document.getElementById('app-wrapper');
        wrapper.classList.add('loading-active');

        try {
            const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`;
            const res = await fetch(url, {
                headers: { 
                    "Authorization": `token ${GH_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Cache-Control": "no-cache" 
                }
            });

            if (res.status === 401) {
                alert("🔴 TOKEN ERROR: Your token is invalid or expired. Please click LOGIN and paste the new one.");
                localStorage.removeItem('gh_token');
            } else if (res.status === 404) {
                alert(`🔴 FILE ERROR: Could not find '${CONFIG.path}' in the repository '${CONFIG.repo}'. Check the spelling!`);
            } else if (!res.ok) {
                alert(`🔴 GITHUB ERROR: ${res.statusText}`);
            } else {
                const data = await res.json();
                fileSha = data.sha;
                // Decode the JSON content from GitHub Base64
                const raw = atob(data.content.replace(/\s/g, ''));
                db = JSON.parse(decodeURIComponent(escape(raw)));

                // Map names for the UI
                specs.forEach(s => {
                    if (s.id === "OP" || s.id === "ICU") nameLookup[s.id] = (db.names || []).filter(x => x[1] === "A").map(x => x[0]);
                    else if (s.id === "D") nameLookup[s.id] = (db.names || []).map(x => x[0]);
                    else nameLookup[s.id] = (db.names || []).filter(x => x[1] === s.id).map(x => x[0]);
                });

                refreshView();
                console.log("✅ Connection Successful!");
            }
        } catch (e) {
            console.error(e);
            alert("🔴 CRITICAL ERROR: Check your internet or browser console.");
        } finally {
            wrapper.classList.remove('loading-active');
        }
    }

    // ... (Keep your refreshView, generateBoard, and migrateFromGoogle functions as they are)
</script>
</body>
</html>
