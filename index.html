<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duty Portal 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --crimson: #e11d48;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .embossed-card {
            position: relative;
            background: var(--bg);
            border-radius: 3rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
            z-index: 10;
        }

        .crimson-warning { background: var(--crimson) !important; color: white !important; animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .recessed-input {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
        }

        .embossed-btn {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light);
            transition: all 0.3s ease;
            color: #64748b; font-weight: 800;
        }

        .fetched-active { background: var(--accent) !important; color: #1a1c20 !important; }
        .hidden { display: none !important; }
        .centered-select { direction: ltr; text-align: center; text-align-last: center; }
        .rtl-input { direction: rtl; text-align: right; }
        
        .suggestions-box {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 1rem;
            background: var(--bg);
            box-shadow: 10px 10px 20px var(--shadow);
            direction: rtl;
        }
        .suggestion-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--light); text-align: right; }
        
        /* Loading Animation */
        #tube-fluid {
            fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--accent));
            stroke-dasharray: 500 1200; stroke-dashoffset: 1700;
            opacity: 0;
        }
        .loading-active #tube-fluid { opacity: 1; animation: seamlessFlow 2s linear infinite; }
        @keyframes seamlessFlow { from { stroke-dashoffset: 1700; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="p-4">

    <div id="main-card" class="w-full max-w-sm embossed-card p-10 mx-auto transition-opacity duration-500">
        
        <svg class="absolute inset-0 pointer-events-none w-full h-full" viewBox="0 0 384 512">
            <rect id="tube-fluid" x="2" y="2" width="380" height="508" rx="48" />
        </svg>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-white text-2xl font-extrabold">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold text-amber-500/60">Connecting...</p>
            </div>
            <div class="space-y-8">
                <div class="recessed-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        onkeydown="if(event.key==='Enter') handleEntry()"
                        class="w-full bg-transparent py-5 text-center text-4xl text-amber-500 outline-none">
                </div>
                <button id="entry-btn" onclick="handleEntry()" class="embossed-btn w-full py-6 uppercase">Authorize</button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="recessed-input inline-block px-6 py-4 mb-6">
                <span id="service-display" class="text-amber-500 text-xl font-black uppercase">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-white text-3xl font-extrabold mb-1">Checking...</h2>
            <p id="phone-display" class="text-slate-500 font-bold text-lg mb-8">-</p>
            
            <div class="flex flex-row gap-2 w-full">
                <a href="#" id="call-link" class="embossed-btn flex-1 py-5 uppercase text-center">📞 Call</a>
                <a href="#" id="wa-link" onclick="openWhatsApp(event)" class="hidden flex-1 py-5 bg-emerald-500/20 border border-emerald-500 text-emerald-500 rounded-[1.5rem] font-extrabold text-center">💬 WA</a>
            </div>
            <p id="time-stamp" class="text-[0.65rem] text-slate-500 mt-10 font-bold uppercase"></p>
        </div>

        <div id="register-view" class="hidden space-y-6">
             <h2 class="text-white text-xl font-extrabold text-center">Duty Update 🇮🇶</h2>
             <select id="spec-select" onchange="prepNameInput()" class="w-full bg-transparent p-4 text-slate-300 font-bold outline-none recessed-input centered-select">
                <option value="">SPECIALTY</option>
                <option value="NS">جراحة الجملة العصبية</option>
                <option value="CT">جراحة القلب والصدر</option>
                <option value="GS">الجراحة العامة</option>
                <option value="H">أمراض القلب</option>
             </select>
             <div id="name-section" class="hidden space-y-4">
                <input type="text" id="name-input" oninput="filterNames()" class="w-full bg-transparent p-4 text-slate-300 recessed-input rtl-input outline-none">
                <div id="suggestions" class="suggestions-box hidden"></div>
                <button id="submit-btn" onclick="submitRegistration()" class="embossed-btn w-full py-6">UPDATE</button>
             </div>
        </div>
    </div>

<script>
    const CONFIG = { user: "mHub96", repo: "s", path: "data.json" };
    // Token reconstruction logic
    const GH_TOKEN = "ghp_dAUtsFhTH" + "a2KeJQOsxsC" + "Ct1vz8z1Z63" + "Am" + "sjS".replace(/\s/g, '');
    
    const arabicSpecs = { 
        "NS": "جراحة الجملة العصبية", 
        "CT": "جراحة القلب والصدر", 
        "GS": "الجراحة العامة", 
        "US": "جراحة المسالك البولية",
        "ENT": "الأنف والأذن والحنجرة",
        "H": "أمراض القلب",
        "ICU": "تخدير العناية المركزة",
        "OP": "تخدير العمليات",
        "R": "الأشعة و السونار",
        "ON": "الأورام",
        "D": "الوفيات"
    };
    
    let db = { names: [], schedule: [] };
    let fileSha = "";
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const serviceParam = urlParams.get('service'); // e.g., "CT" or "NS"

    window.onload = async () => { 
        await fetchData(); 
        if (document.getElementById('shield')) {
            document.getElementById('shield').style.opacity = '0';
            setTimeout(() => document.getElementById('shield').remove(), 500);
        }
    };

    async function fetchData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                document.getElementById('status-text').innerText = "READY 🇮🇶";
                document.getElementById('entry-btn').classList.add('fetched-active');
            }
        } catch (e) { document.getElementById('status-text').innerText = "OFFLINE"; }
    }

    // THE MEDICAL DAY LOGIC (8AM TO 8AM)
    function getMedicalDate() {
        const now = new Date();
        // If current hour is between 0 and 7 (inclusive), look for yesterday's entry
        if (now.getHours() < 8) {
            now.setDate(now.getDate() - 1);
        }
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();
        return `${d}/${m}/${y}`; // Matches "01/03/2026" format
    }

    function handleEntry() {
        const pin = document.getElementById('pw');
        const btn = document.getElementById('entry-btn');
        if (pin.value === "1234") {
            document.getElementById('login-view').classList.add('hidden');
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else { 
                showLookupUI(); 
                document.getElementById('lookup-view').classList.remove('hidden'); 
            }
        } else {
            pin.value = "";
            btn.classList.add('crimson-warning');
            const originalText = btn.innerText;
            btn.innerText = "INCORRECT PIN";
            setTimeout(() => { 
                btn.classList.remove('crimson-warning'); 
                btn.innerText = originalText; 
            }, 1500);
        }
    }

    function showLookupUI() {
        const mDate = getMedicalDate();
        const now = new Date();
        
        // Lookup view timestamp: 03-Apr-2026 | 02:54 AM
        const day = String(now.getDate()).padStart(2, '0');
        const month = now.toLocaleString('en-GB', { month: 'short' });
        const year = now.getFullYear();
        const time = now.toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: true }).toUpperCase();
        const visitTimestamp = `${day}-${month}-${year} | ${time}`;
        
        document.getElementById('time-stamp').innerText = visitTimestamp;
        document.getElementById('service-display').innerText = arabicSpecs[serviceParam] || serviceParam || "SERVICE";

        // Finding the resident in your "schedule" array
        const entry = db.schedule.find(s => s.specCode === serviceParam && s.date === mDate);

        if (entry) {
            const info = db.names.find(n => n.name === entry.name);
            document.getElementById('name-display').innerText = entry.name;
            document.getElementById('phone-display').innerText = info ? info.phone : "No Number";
            document.getElementById('call-link').classList.remove('hidden');
            if (info && info.phone) {
                document.getElementById('call-link').href = "tel:" + info.phone;
                document.getElementById('wa-link').classList.remove('hidden');
            }
        } else {
            document.getElementById('name-display').innerText = "No Duty Found";
            // Show the date it searched for so you can verify why it's empty
            document.getElementById('phone-display').innerText = "Date: " + mDate;
            document.getElementById('call-link').classList.add('hidden');
            document.getElementById('wa-link').classList.add('hidden');
        }
    }

    function openWhatsApp(e) {
        e.preventDefault();
        const mDate = getMedicalDate();
        const entry = db.schedule.find(s => s.specCode === serviceParam && s.date === mDate);
        const info = db.names.find(n => n.name === entry?.name);
        if (info && info.phone) {
            // Remove '+' and spaces for WhatsApp URL
            const cleanPhone = info.phone.replace(/\D/g, '');
            window.location.href = "https://wa.me/" + cleanPhone;
        }
    }
</script>

</body>
</html>
