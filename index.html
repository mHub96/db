<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duty Portal 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20; --light: #2a2d34; --shadow: #0d0e11;
            --accent: #fbbf24; --crimson: #e11d48; --btn-grey: #33373e;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* AESTHETICS: Breathing Neumorphic Card */
        .embossed-card {
            position: relative; background: var(--bg); border-radius: 3rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
            z-index: 10; transition: all 0.7s ease;
        }
        .breathing { animation: frameBreath 3s infinite ease-in-out; }
        @keyframes frameBreath {
            0%, 100% { box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light); }
            50% { box-shadow: 15px 15px 45px var(--shadow), -8px -8px 30px var(--light), 0 0 50px rgba(251, 191, 36, 0.2); }
        }

        /* AESTHETICS: Fluid Tube Path */
        .tube-container { position: absolute; inset: 0; pointer-events: none; z-index: 20; width: 100%; height: 100%; }
        #tube-bg { fill: none; stroke: rgba(251, 191, 36, 0.03); stroke-width: 4; }
        #tube-fluid {
            fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--accent));
            stroke-dasharray: 500 1200; stroke-dashoffset: 1700;
            opacity: 0; transition: opacity 0.4s;
        }
        .loading-active #tube-fluid { opacity: 1; animation: seamlessFlow 2s linear infinite; }
        @keyframes seamlessFlow { from { stroke-dashoffset: 1700; } to { stroke-dashoffset: 0; } }

        .recessed-input {
            background: var(--bg); border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
        }

        .embossed-btn {
            background: var(--bg); border-radius: 1.5rem;
            box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #64748b; font-weight: 800;
        }

        .fetched-active { background: var(--accent) !important; color: #1a1c20 !important; box-shadow: 0 0 25px rgba(251, 191, 36, 0.5) !important; }

        /* FIX: Quick Crimson Shake for PIN Error */
        .crimson-warning { background: var(--crimson) !important; color: white !important; animation: quickShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes quickShake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 70% { transform: translate3d(4px, 0, 0); }
            40%, 60% { transform: translate3d(-4px, 0, 0); }
        }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        .hidden { display: none !important; }
        .rtl-text { direction: rtl; text-align: right; }
        .phone-display { direction: ltr !important; unicode-bidi: isolate; display: inline-block; }
    </style>
</head>
<body class="p-4">

    <div id="shield"></div>

    <div id="main-card" class="w-full max-w-sm embossed-card breathing p-10 mx-auto">
        <svg class="tube-container" viewBox="0 0 384 512" preserveAspectRatio="none">
            <rect id="tube-bg" x="2" y="2" width="380" height="508" rx="48" />
            <rect id="tube-fluid" x="2" y="2" width="380" height="508" rx="48" />
        </svg>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-white text-2xl font-extrabold tracking-tight">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold tracking-[0.3em] text-amber-500/60">Connecting Database...</p>
            </div>
            <div class="space-y-8">
                <div class="recessed-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        onkeydown="if(event.key==='Enter') handleEntry()"
                        class="w-full bg-transparent py-5 text-center text-4xl tracking-[1rem] text-amber-500 outline-none">
                </div>
                <button id="entry-btn" onclick="handleEntry()" class="embossed-btn w-full py-6 tracking-widest uppercase">Authorize</button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="recessed-input inline-block px-6 py-4 mb-6">
                <span id="service-display" class="text-amber-500 text-xl font-black uppercase">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-white text-3xl font-extrabold mb-1 rtl-text">...</h2>
            <p id="phone-display" class="text-slate-500 font-bold text-lg mb-8 phone-display">-</p>
            
            <div class="flex flex-row gap-2 w-full">
                <a href="#" id="call-link" class="embossed-btn flex-1 py-5 uppercase text-center text-xs sm:text-base whitespace-nowrap">📞 SIM Call</a>
                <a href="#" id="wa-link" onclick="openWhatsApp(event)" class="hidden flex-1 py-5 bg-emerald-500/20 border border-emerald-500 text-emerald-500 rounded-[1.5rem] font-extrabold text-center text-xs sm:text-base whitespace-nowrap">💬 WhatsApp</a>
            </div>
            <p id="time-stamp" class="text-[0.65rem] text-slate-500 mt-10 font-bold tracking-wider uppercase"></p>
        </div>
    </div>

<script>
    const CONFIG = { user: "mHub96", repo: "s", path: "data.json" };
    const GH_TOKEN = "ghp_dAUtsFhTH" + "a2KeJQOsxsC" + "Ct1vz8z1Z63" + "Am" + "sjS".replace(/\s/g, '');

    const arabicSpecs = { 
        "NS": "جراحة الجملة العصبية", 
        "CT": "جراحة الصدر و الاوعية الدموية", 
        "GS": "الجراحة العامة",
        "US": "جراحة المسالك البولية",
        "H": "أمراض القلب"
    };

    let db = { names: [], schedule: [] };
    const urlParams = new URLSearchParams(window.location.search);
    
    function getParam(key) {
        for (let [k, v] of urlParams.entries()) {
            if (k.toLowerCase() === key.toLowerCase()) return v;
        }
        return null;
    }

    const serviceCode = getParam('service');

    window.onload = async () => { 
        setTimeout(() => { 
            const s = document.getElementById('shield');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
        }, 300);
        await fetchData(); 
    };

    async function fetchData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            if (res.ok) {
                const data = await res.json();
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                document.getElementById('status-text').innerText = "READY 🇮🇶";
                document.getElementById('entry-btn').classList.add('fetched-active');
            }
        } catch (e) { document.getElementById('status-text').innerText = "OFFLINE"; }
    }

    function getMedicalDate() {
        const now = new Date();
        if (now.getHours() < 8) now.setDate(now.getDate() - 1);
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        return `${d}/${m}/${now.getFullYear()}`;
    }

    function handleEntry() {
        const pin = document.getElementById('pw');
        const btn = document.getElementById('entry-btn');
        const card = document.getElementById('main-card');

        if (pin.value === "1234") {
            card.style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-view').classList.add('hidden');
                showLookupUI();
                document.getElementById('lookup-view').classList.remove('hidden');
                card.style.opacity = "1";
            }, 600);
        } else {
            pin.value = "";
            btn.classList.add('crimson-warning');
            const original = btn.innerText;
            btn.innerText = "INCORRECT PIN!";
            setTimeout(() => { 
                btn.classList.remove('crimson-warning'); 
                btn.innerText = original; 
            }, 1000);
        }
    }

    function showLookupUI() {
        const targetDate = getMedicalDate();
        const now = new Date();
        const timestamp = `${String(now.getDate()).padStart(2, '0')}-${now.toLocaleString('en-GB', {month:'short'})}-${now.getFullYear()} | ${now.toLocaleString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase()}`;
        
        document.getElementById('time-stamp').innerText = timestamp;
        document.getElementById('service-display').innerText = arabicSpecs[serviceCode] || serviceCode || "SERVICE";

        const entry = db.schedule.find(s => s.specCode === serviceCode && s.date === targetDate);

        if (entry) {
            const info = db.names.find(n => n.name === entry.name);
            document.getElementById('name-display').innerText = entry.name;
            document.getElementById('phone-display').innerText = info ? info.phone : "No Number";
            if (info?.phone) {
                document.getElementById('call-link').href = "tel:" + info.phone;
                document.getElementById('wa-link').classList.remove('hidden');
            }
        } else {
            document.getElementById('name-display').innerText = "No Duty Found";
            document.getElementById('phone-display').innerText = "Searched: " + targetDate;
            document.getElementById('call-link').classList.add('hidden');
        }
    }

    function openWhatsApp(e) {
        e.preventDefault();
        const targetDate = getMedicalDate();
        const entry = db.schedule.find(s => s.specCode === serviceCode && s.date === targetDate);
        const info = db.names.find(n => n.name === entry?.name);
        if (info?.phone) {
            window.location.href = "https://wa.me/" + info.phone.replace(/\D/g, '');
        }
    }
</script>
</body>
</html>
