<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --column-width: 290px; --font-size: 0.9rem; --nav-h: 70px; }
        .track-NS { --spec-color: #fbbf24; } .track-CT { --spec-color: #f87171; } 
        .track-GS { --spec-color: #34d399; } .track-US { --spec-color: #60a5fa; } 
        .track-ENT { --spec-color: #a78bfa; } .track-H { --spec-color: #fb7185; } 
        .track-D { --spec-color: #94a3b8; } .track-OP { --spec-color: #fb923c; } 
        .track-ICU { --spec-color: #2dd4bf; } .track-R { --spec-color: #818cf8; } 
        .track-ON { --spec-color: #f472b6; } 

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .board-container { flex-grow: 1; display: flex; gap: 1.5rem; padding: 1.5rem; overflow-x: auto; align-items: flex-start; height: calc(100vh - var(--nav-h)); }
        .specialty-track { flex: 0 0 var(--column-width); background: var(--card); border-radius: 1.8rem; display: flex; flex-direction: column; max-height: 95%; border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.8), 0 0 15px -5px var(--spec-color); overflow: hidden; }
        .track-header { padding: 1.2rem; text-align: center; border-bottom: 3px solid var(--spec-color); }
        .track-header h2 { color: var(--spec-color); font-weight: 900; font-size: 0.75rem; text-transform: uppercase; }
        .days-list { flex: 1; overflow-y: auto; padding: 0.75rem; scrollbar-width: none; }
        .day-box { position: relative; background: rgba(255,255,255,0.02); margin-bottom: 0.5rem; border-radius: 0.9rem; padding: 0.4rem; border: 1px solid transparent; }
        .day-box.weekend { background: rgba(255,255,255,0.05); border-left: 3px solid var(--spec-color); }
        .day-label { display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 800; color: #4b5563; padding: 0 0.5rem; }
        .input-wrapper { position: relative; width: 100%; direction: rtl; }
        .cell-input, .ghost-text { width: 100%; font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: var(--font-size); padding: 0.6rem; text-align: right; }
        .cell-input { background: transparent; border: none; outline: none; color: #fff; z-index: 10; position: relative; }
        .ghost-text { position: absolute; top: 0; right: 0; color: rgba(255,255,255,0.1); pointer-events: none; height: 100%; display: flex; align-items: center; padding-right: 0.6rem; }
        .dropdown-arrow { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.5rem; color: #334155; cursor: pointer; z-index: 25; }
        .prefilled { color: var(--spec-color) !important; font-weight: 600; }
        .custom-menu { position: absolute; top: 100%; right: 0; width: 100%; max-height: 180px; overflow-y: auto; background: #1c1f26; border: 1px solid var(--spec-color); border-radius: 0.6rem; z-index: 1000; display: none; }
        .custom-menu div { padding: 0.8rem; font-size: 0.8rem; text-align: right; cursor: pointer; color: #94a3b8; }
        .custom-menu div:hover { background: var(--spec-color); color: #000; }
        .nav-bar { height: var(--nav-h); padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #111418; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #app-wrapper { transition: opacity 0.4s ease; }
        .loading-active { opacity: 0.3 !important; pointer-events: none !important; cursor: wait; }
    </style>
</head>
<body>

    <div id="app-wrapper" class="loading-active">
        <div class="nav-bar">
            <h1 class="text-lg font-black text-white uppercase tracking-tighter">Iraqi Teaching Hosp. Schedules</h1>
            <div class="flex gap-4 items-center">
                <input type="month" id="month-picker" class="bg-black text-amber-500 px-3 py-1.5 rounded-lg font-bold border border-white/10 text-xs" onchange="handleMonthChange()">
                <button onclick="saveAll()" id="sync-btn" class="bg-white text-black px-5 py-2 rounded-lg font-black text-[10px] uppercase active:scale-95 transition-transform">Sync Schedule</button>
            </div>
        </div>
        <div class="board-container" id="board"></div>
    </div>

<script>
    const GH_USER = "mHub96";
    const GH_REPO = "db";
    const GH_TOKEN = "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";
    const GH_PATH = "data.json";

    const githubRawUrl = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${GH_PATH}`;
    const githubApiUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_PATH}`;

    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {};
    let fullDatabase = { names: [], schedule: [] };
    let fileSha = "";

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        generateBoard();
        initSync();
    };

    function lockUI() { document.getElementById('app-wrapper').classList.add('loading-active'); }
    function unlockUI() { document.getElementById('app-wrapper').classList.remove('loading-active'); }

    async function handleMonthChange() {
        lockUI();
        generateBoard();
        renderSchedule();
        setTimeout(unlockUI, 300);
    }

    async function initSync() {
        lockUI();
        try {
            const [rawRes, apiRes] = await Promise.all([
                fetch(`${githubRawUrl}?t=${Date.now()}`),
                fetch(githubApiUrl, { headers: { "Authorization": `token ${GH_TOKEN}` } })
            ]);
            fullDatabase = await rawRes.json();
            const apiData = await apiRes.json();
            fileSha = apiData.sha;

            specialties.forEach(s => {
                if (s.id === "OP" || s.id === "ICU") nameData[s.id] = fullDatabase.names.filter(x => x[1] === "A").map(x => x[0]);
                else if (s.id === "D") nameData[s.id] = fullDatabase.names.map(x => x[0]);
                else nameData[s.id] = fullDatabase.names.filter(x => x[1] === s.id).map(x => x[0]);
            });

            renderSchedule();
            unlockUI();
        } catch(e) { console.error(e); alert("GitHub Connection Error! 🇮🇶"); }
    }

    function renderSchedule() {
        const [targetYr, targetMon] = document.getElementById('month-picker').value.split('-');
        fullDatabase.schedule.forEach(row => {
            const [d, mon, yr] = row.date.split('/');
            if (mon === targetMon && yr === targetYr) {
                const el = document.getElementById(`input-${parseInt(d)}-${row.specCode}`);
                if (el) { el.value = row.name; el.classList.add('prefilled'); }
            }
        });
    }

    async function saveAll() {
        lockUI();
        const btn = document.getElementById('sync-btn');
        btn.innerText = "Syncing...";

        const inputs = Array.from(document.querySelectorAll('.cell-input')).filter(x => x.value.trim() !== "");
        const currentMonthEntries = inputs.map(x => ({ date: x.dataset.date, specCode: x.dataset.spec, name: x.value.trim() }));

        const [activeYr, activeMon] = document.getElementById('month-picker').value.split('-');
        const otherData = fullDatabase.schedule.filter(row => !row.date.endsWith(`${activeMon}/${activeYr}`));
        fullDatabase.schedule = [...otherData, ...currentMonthEntries];

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(fullDatabase, null, 2))));
        try {
            const response = await fetch(githubApiUrl, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `Update ${new Date().toLocaleString()} 🇮🇶`, content: content, sha: fileSha })
            });
            if (response.ok) {
                const result = await response.json();
                fileSha = result.content.sha;
                btn.innerText = "Synced ✅";
                inputs.forEach(x => { x.classList.remove('new-entry'); x.classList.add('prefilled'); });
            }
        } catch(e) { btn.innerText = "Error ⚠️"; }
        finally { setTimeout(() => { btn.innerText = "Sync Schedule"; unlockUI(); }, 1500); }
    }

    function generateBoard() {
        const [year, month] = document.getElementById('month-picker').value.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const board = document.getElementById('board');
        board.innerHTML = "";
        specialties.forEach(spec => {
            const track = document.createElement('div');
            track.className = `specialty-track track-${spec.id}`;
            let html = `<div class="track-header"><h2>${spec.name}</h2></div><div class="days-list">`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                const dayName = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
                const dateFull = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
                const uid = `${d}-${spec.id}`;
                html += `<div class="day-box ${dateObj.getDay() === 5 || dateObj.getDay() === 6 ? 'weekend' : ''}">
                    <div class="day-label"><span>${dateFull.substring(0,5)}</span><span>${dayName}</span></div>
                    <div class="input-wrapper">
                        <div class="ghost-text" id="ghost-${uid}"></div>
                        <input type="text" class="cell-input" id="input-${uid}" oninput="handleAC(this, '${spec.id}', '${uid}')" onkeydown="handleKeys(event, this, '${uid}')" onblur="handleBlur('${uid}')" data-date="${dateFull}" data-spec="${spec.id}" autocomplete="off">
                        <span class="dropdown-arrow" onclick="toggleMenu(event, '${uid}', '${spec.id}')">▼</span>
                        <div class="custom-menu" id="menu-${uid}"></div>
                    </div></div>`;
            }
            track.innerHTML = html + `</div>`;
            board.appendChild(track);
        });
    }

    function handleAC(el, sid, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const val = el.value;
        ghost.innerText = ""; ghost.removeAttribute('data-full');
        el.classList.remove('prefilled');
        if (!val.trim()) return;
        if (nameData[sid]) {
            const cleanInput = val.toLowerCase().replace(/^د\.\s*/, "");
            const match = nameData[sid].find(n => n.toLowerCase().startsWith(val.toLowerCase()) || n.toLowerCase().replace(/^د\.\s*/, "").startsWith(cleanInput));
            if (match) {
                ghost.setAttribute('data-full', match);
                let display = val.startsWith("د.") ? match : match.replace(/^د\.\s*/, "");
                if (display.toLowerCase().startsWith(val.toLowerCase())) ghost.innerHTML = `<span class="opacity-0">${val}</span>${display.substring(val.length)}`;
                else ghost.innerText = display;
            }
        }
    }

    function toggleMenu(e, uid, sid) {
        e.stopPropagation();
        const m = document.getElementById(`menu-${uid}`);
        const open = m.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(x => x.style.display = 'none');
        if (!open) { m.innerHTML = (nameData[sid] || []).map(n => `<div onmousedown="selectName('${uid}', '${n}')">${n}</div>`).join(''); m.style.display = "block"; }
    }

    function selectName(uid, name) {
        const i = document.getElementById(`input-${uid}`);
        i.value = name; i.classList.add('prefilled');
        document.getElementById(`ghost-${uid}`).innerText = "";
        document.getElementById(`menu-${uid}`).style.display = 'none';
    }

    function handleKeys(e, el, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const full = ghost.getAttribute('data-full');
        if (e.key === "Enter") {
            e.preventDefault();
            if (full) { el.value = full; el.classList.add('prefilled'); ghost.innerText = ""; }
            const [d, sid] = uid.split('-');
            const nextEl = document.getElementById(`input-${parseInt(d) + 1}-${sid}`);
            if (nextEl) { nextEl.focus(); nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }
    }

    function handleBlur(uid) {
        setTimeout(() => {
            const m = document.getElementById(`menu-${uid}`);
            if (m) m.style.display = 'none';
            document.getElementById(`ghost-${uid}`).innerText = "";
        }, 250);
    }
</script>
</body>
</html>
